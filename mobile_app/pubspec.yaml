name: valide_school
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # i18n (Story 0.16) — gen-l10n a besoin de flutter_localizations + intl
  # pour les delegates Material/Cupertino et la generation de AppLocalizations.
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.3.0
  logger: ^2.7.0
  fpdart: ^1.2.0
  equatable: ^2.0.8
  flutter_screenutil: ^5.9.3
  lucide_icons_flutter: ^3.1.14+2

  # Story 0.14 — feedback layer (services + overlays celebration)
  flutter_animate: ^4.5.2
  audioplayers: ^6.4.0
  shared_preferences: ^2.3.3

  # Story 0.15 — rendu pedagogique unifie (Markdown + LaTeX + streaming).
  # Isole derriere lib/core/widgets/pedagogical_content.dart. Aucun autre
  # fichier ne doit l'importer (cf. ADR-014, qui supersede ADR-009 apres
  # KO de flutter_smooth_markdown en phase terrain Story 0.19).
  # Mermaid non supporte nativement -> fallback bloc code brut.
  gpt_markdown: ^1.1.7

  # Story 0.6 — Firebase Android + iOS + Firebase AI Logic (cf. ADR-003,
  # ADR-012). Tous les modules sont consommes via providers Riverpod
  # lazy depuis lib/core/firebase/providers.dart — main.dart n'importe
  # QUE firebase_core (init au boot) + firebase_crashlytics (setup au boot).
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  cloud_functions: ^6.3.2
  firebase_messaging: ^16.3.0
  firebase_crashlytics: ^5.2.3
  firebase_analytics: ^12.4.2
  firebase_remote_config: ^6.5.2
  firebase_app_check: ^0.4.4+2
  firebase_ai: ^3.12.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  # Active la generation gen-l10n a partir de l10n.yaml + lib/l10n/*.arb.
  generate: true

  # Fonts (Story 0.11) : variable fonts embarquees pour eviter tout appel
  # reseau runtime Google Fonts. Une seule .ttf par famille couvre toutes
  # les graisses (400/600/700/800/900 pour Nunito Sans, 400/700 pour
  # JetBrains Mono). Source : github.com/google/fonts/ofl/.
  fonts:
    - family: Nunito Sans
      fonts:
        - asset: assets/fonts/NunitoSans-Variable.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf

  # Story 0.14 — assets audio. Format AAC/M4A (cross-platform iOS+Android,
  # OGG impossible iOS — cf. ADR-011 + CLAUDE.md). silence.m4a sert de
  # placeholder pour les 12 sons AppSfx tant que la production audio
  # n'est pas faite (TODO story future). Le fichier reel est unique
  # (~1 KB) et le mapping AppSfx -> path se fait dans AudioService.
  assets:
    - assets/audio/silence.m4a
    # Story 0.19 R2 — cours de test pour validation precoce du wrapper
    # PedagogicalContent. Retires a la cloture E0 (Story 0.21) ou avant.
    - assets/dev/test_courses/
    # Story 0.21 — markdown sentinelle bilingue (FR/EN) charge depuis
    # HelloPage via rootBundle. Hors arb car contient LaTeX `$$...$$` qui
    # casse gen-l10n (Mermaid ok mais $$ confond le parser ICU).
    - assets/sentinel/
